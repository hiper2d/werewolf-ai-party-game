<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Create New Game — Werewolf</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root, [data-theme="dark"] {
    /* Neutral dark scale — replaces purple with cool greys */
    --bg-0: #0b0c0f;          /* page background */
    --bg-1: #111317;          /* card background */
    --bg-2: #161a20;          /* input background */
    --bg-3: #1d2229;          /* hover surface */
    --bg-4: #252a33;          /* active surface */
    --line-1: #1f242c;        /* hairline */
    --line-2: #2a313b;        /* stronger border */
    --line-3: #3a4250;        /* focus ring base */

    --fg-0: #ecedef;          /* primary text */
    --fg-1: #b9bcc3;          /* secondary text */
    --fg-2: #7e848f;          /* tertiary text */
    --fg-3: #555b66;          /* muted */

    /* Accent: a single cool, restrained blue. No purple. */
    --accent: oklch(72% 0.09 230);
    --accent-soft: oklch(72% 0.09 230 / 0.14);
    --accent-line: oklch(72% 0.09 230 / 0.45);
    --accent-fg: oklch(96% 0.02 230);
    --accent-strong: oklch(62% 0.10 230);
    --on-accent: #0b0c0f;

    --info-bg: oklch(72% 0.09 230 / 0.10);
    --info-border: oklch(72% 0.09 230 / 0.40);
    --info-fg: oklch(85% 0.06 230);

    --danger: oklch(70% 0.13 25);
  }

  [data-theme="light"] {
    --bg-0: #f5f6f8;
    --bg-1: #ffffff;
    --bg-2: #f3f4f6;
    --bg-3: #eaecef;
    --bg-4: #dfe2e7;
    --line-1: #e6e8ec;
    --line-2: #d4d8de;
    --line-3: #b7bdc6;

    --fg-0: #15181d;
    --fg-1: #3d4450;
    --fg-2: #6b727d;
    --fg-3: #9aa0aa;

    --accent: oklch(55% 0.12 235);
    --accent-soft: oklch(55% 0.12 235 / 0.10);
    --accent-line: oklch(55% 0.12 235 / 0.45);
    --accent-fg: oklch(38% 0.12 235);
    --accent-strong: oklch(48% 0.13 235);
    --on-accent: #ffffff;

    --info-bg: oklch(55% 0.12 235 / 0.07);
    --info-border: oklch(55% 0.12 235 / 0.35);
    --info-fg: oklch(40% 0.12 235);

    --danger: oklch(55% 0.18 25);

    --radius-sm: 6px;
    --radius-md: 8px;
    --radius-lg: 12px;
    --radius-xl: 16px;

    --shadow-1: 0 1px 0 rgba(255,255,255,0.02) inset, 0 1px 2px rgba(0,0,0,0.4);
    --shadow-2: 0 8px 24px rgba(0,0,0,0.4), 0 2px 6px rgba(0,0,0,0.3);
    --shadow-pop: 0 16px 40px rgba(0,0,0,0.55), 0 4px 12px rgba(0,0,0,0.4);

    --font-sans: 'Inter', system-ui, -apple-system, Segoe UI, sans-serif;
    --font-mono: 'JetBrains Mono', ui-monospace, Menlo, monospace;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: var(--font-sans);
    background: var(--bg-0);
    color: var(--fg-0);
    font-size: 14px;
    line-height: 1.45;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }

  /* ---------- Top nav ---------- */
  .nav {
    height: 56px;
    border-bottom: 1px solid var(--line-1);
    display: flex; align-items: center;
    padding: 0 24px;
    gap: 16px;
    background: var(--bg-0);
    position: sticky; top: 0; z-index: 10;
  }
  .nav-left, .nav-right { display: flex; align-items: center; gap: 18px; }
  .nav-right { margin-left: auto; gap: 14px; }
  .brand { display: flex; align-items: center; gap: 10px; font-weight: 600; }
  .brand-mark {
    width: 28px; height: 28px; border-radius: 8px;
    background: linear-gradient(135deg, #2a313b 0%, #161a20 100%);
    border: 1px solid var(--line-2);
    display: grid; place-items: center;
    color: var(--fg-1);
    font-family: var(--font-mono);
    font-size: 12px; font-weight: 600;
    box-shadow: var(--shadow-1);
  }
  .brand-name { color: var(--fg-0); font-size: 13px; letter-spacing: -0.005em; }
  .api-tag {
    font-family: var(--font-mono);
    font-size: 10px;
    padding: 2px 6px;
    border: 1px solid var(--line-2);
    border-radius: 4px;
    color: var(--fg-2);
    margin-left: 4px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }
  .nav-link {
    color: var(--fg-1);
    font-size: 13px;
    text-decoration: none;
    padding: 6px 0;
    border-bottom: 1px solid transparent;
    transition: color 120ms;
  }
  .nav-link:hover { color: var(--fg-0); }
  .nav-divider { width: 1px; height: 16px; background: var(--line-2); }
  .mode-toggle {
    display: flex; align-items: center; gap: 6px;
    padding: 6px 10px;
    border: 1px solid var(--line-2);
    border-radius: 999px;
    background: var(--bg-1);
    color: var(--fg-1);
    font-size: 12px;
    cursor: pointer;
  }
  .mode-toggle:hover { border-color: var(--line-3); color: var(--fg-0); }
  .btn {
    font-family: inherit;
    font-size: 13px;
    font-weight: 500;
    padding: 7px 14px;
    border-radius: var(--radius-md);
    border: 1px solid var(--line-2);
    background: var(--bg-1);
    color: var(--fg-0);
    cursor: pointer;
    transition: all 120ms;
  }
  .btn:hover { background: var(--bg-2); border-color: var(--line-3); }
  .btn-ghost { background: transparent; }
  .btn-primary {
    background: var(--bg-3);
    border-color: var(--line-3);
    color: var(--fg-0);
  }
  .btn-primary:hover { background: var(--bg-4); }
  .btn-accent {
    background: var(--accent-soft);
    border-color: var(--accent-line);
    color: var(--accent-fg);
  }
  .btn-accent:hover { background: oklch(72% 0.09 230 / 0.22); }

  /* ---------- Page ---------- */
  .page {
    max-width: 1040px;
    margin: 0 auto;
    padding: 40px 24px 80px;
  }
  .card {
    background: var(--bg-1);
    border: 1px solid var(--line-1);
    border-radius: var(--radius-xl);
    box-shadow: var(--shadow-2);
    overflow: hidden;
  }
  .card-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 22px 28px;
    border-bottom: 1px solid var(--line-1);
  }
  .card-title { font-size: 18px; font-weight: 600; letter-spacing: -0.01em; }
  .card-body { padding: 24px 28px 28px; }

  /* ---------- Form ---------- */
  .form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px 16px;
  }
  .full-row { grid-column: 1 / -1; }
  .field { display: flex; flex-direction: column; gap: 6px; }
  .field-row {
    display: grid;
    grid-template-columns: 140px 1fr;
    gap: 16px;
    align-items: start;
  }
  .field-row.tight { gap: 12px; }
  .label {
    font-size: 12px;
    font-weight: 500;
    color: var(--fg-1);
    letter-spacing: 0.005em;
  }
  .label-inline {
    font-size: 13px;
    color: var(--fg-1);
    padding-top: 9px;
  }
  .input, .textarea, .select {
    width: 100%;
    background: var(--bg-2);
    border: 1px solid var(--line-2);
    border-radius: var(--radius-md);
    color: var(--fg-0);
    font-family: inherit;
    font-size: 13px;
    padding: 9px 12px;
    line-height: 1.4;
    transition: border-color 120ms, background 120ms;
  }
  .input::placeholder, .textarea::placeholder { color: var(--fg-3); }
  .input:hover, .textarea:hover, .select:hover { border-color: var(--line-3); }
  .input:focus, .textarea:focus, .select:focus {
    outline: none;
    border-color: var(--accent-line);
    background: var(--bg-2);
    box-shadow: 0 0 0 3px var(--accent-soft);
  }
  .textarea { resize: vertical; min-height: 76px; padding: 10px 12px; }
  .select-wrap { position: relative; }
  .select {
    appearance: none;
    -webkit-appearance: none;
    padding-right: 32px;
    cursor: pointer;
  }
  .select-caret {
    position: absolute; right: 10px; top: 50%;
    transform: translateY(-50%);
    pointer-events: none;
    color: var(--fg-2);
    font-size: 11px;
  }

  /* ---------- Special Roles chips ---------- */
  .roles-row {
    display: flex; flex-wrap: wrap; gap: 8px;
    padding-top: 4px;
  }
  .role-chip {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 7px 12px 7px 10px;
    border-radius: 999px;
    border: 1px solid var(--line-2);
    background: var(--bg-2);
    color: var(--fg-1);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 120ms;
    user-select: none;
  }
  .role-chip:hover {
    border-color: var(--line-3);
    background: var(--bg-3);
    color: var(--fg-0);
  }
  .role-chip[aria-pressed="true"] {
    background: var(--accent-soft);
    border-color: var(--accent-line);
    color: var(--accent-fg);
  }
  .role-chip .chip-icon {
    width: 22px; height: 22px;
    border-radius: 6px;
    background: var(--bg-3);
    border: 1px solid var(--line-2);
    display: grid; place-items: center;
    font-size: 12px;
    color: var(--fg-1);
    flex-shrink: 0;
  }
  .role-chip[aria-pressed="true"] .chip-icon {
    background: var(--accent-line);
    border-color: transparent;
    color: var(--on-accent);
  }
  .role-chip .chip-check {
    width: 16px; height: 16px;
    border-radius: 4px;
    border: 1.5px solid var(--line-3);
    background: transparent;
    display: grid; place-items: center;
    color: transparent;
    transition: all 120ms;
    flex-shrink: 0;
  }
  .role-chip[aria-pressed="true"] .chip-check {
    background: var(--accent);
    border-color: var(--accent);
    color: var(--on-accent);
  }

  /* ---------- Generating banner ---------- */
  .banner {
    margin-top: 16px;
    border: 1px solid var(--info-border);
    background: var(--info-bg);
    border-radius: var(--radius-lg);
    padding: 14px 18px;
    display: flex; align-items: flex-start; gap: 12px;
    animation: pop 200ms ease-out;
  }
  .banner-icon {
    width: 28px; height: 28px;
    border-radius: 8px;
    background: var(--accent-soft);
    border: 1px solid var(--accent-line);
    color: var(--accent-fg);
    display: grid; place-items: center;
    flex-shrink: 0;
    margin-top: 1px;
  }
  .banner-icon.spinning svg { animation: spin 1.4s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .banner-body { flex: 1; min-width: 0; }
  .banner-title {
    font-size: 14px; font-weight: 600;
    color: var(--info-fg);
    display: flex; align-items: center; gap: 6px;
  }
  .banner-title .dots::after {
    content: "";
    display: inline-block;
    animation: dots 1.4s steps(4, end) infinite;
  }
  @keyframes dots {
    0% { content: ""; }
    25% { content: "."; }
    50% { content: ".."; }
    75% { content: "..."; }
  }
  .banner-text {
    font-size: 13px;
    color: var(--fg-1);
    margin-top: 3px;
  }

  /* ---------- Preview section ---------- */
  .preview-section {
    margin-top: 24px;
    animation: pop 220ms ease-out;
  }
  .preview-h1 {
    font-size: 20px;
    font-weight: 600;
    letter-spacing: -0.01em;
    margin: 0 0 14px;
    color: var(--fg-0);
  }
  .preview-h2 {
    font-size: 15px;
    font-weight: 600;
    margin: 24px 0 10px;
    color: var(--fg-0);
    display: flex; align-items: center; gap: 10px;
  }
  .preview-h2::after {
    content: "";
    flex: 1; height: 1px; background: var(--line-1);
  }
  .preview-card {
    background: var(--bg-1);
    border: 1px solid var(--line-1);
    border-radius: var(--radius-lg);
    padding: 16px 18px;
    margin-bottom: 12px;
  }
  .preview-meta {
    font-size: 11px;
    color: var(--fg-2);
    font-family: var(--font-mono);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 10px;
    display: flex; align-items: center; gap: 8px;
  }
  .preview-meta b {
    color: var(--fg-0);
    font-weight: 600;
    text-transform: none;
    letter-spacing: 0;
    font-family: var(--font-sans);
    font-size: 13px;
  }
  .preview-grid-2 {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }
  .preview-grid-3 {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 12px;
  }
  .player-card {
    background: var(--bg-1);
    border: 1px solid var(--line-1);
    border-radius: var(--radius-lg);
    padding: 14px 16px;
    margin-bottom: 10px;
    display: flex; flex-direction: column; gap: 10px;
  }
  .player-head {
    display: flex; align-items: center; gap: 12px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--line-1);
  }
  .player-avatar {
    width: 36px; height: 36px;
    border-radius: 999px;
    background: var(--bg-3);
    border: 1px solid var(--line-2);
    display: grid; place-items: center;
    font-weight: 600;
    color: var(--fg-1);
    flex-shrink: 0;
  }
  .player-name { font-size: 14px; font-weight: 600; color: var(--fg-0); }
  .player-sub { font-size: 11px; color: var(--fg-2); font-family: var(--font-mono); margin-top: 2px; }
  .player-tag {
    margin-left: auto;
    font-size: 10px;
    padding: 3px 8px;
    border-radius: 999px;
    background: var(--bg-3);
    border: 1px solid var(--line-2);
    color: var(--fg-1);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    font-weight: 600;
  }
  .player-tag.werewolf {
    background: oklch(60% 0.13 25 / 0.12);
    border-color: oklch(60% 0.13 25 / 0.45);
    color: oklch(70% 0.13 25);
  }
  .play-style-tag {
    display: inline-flex; align-items: center;
    font-size: 11px;
    padding: 3px 8px;
    border-radius: 4px;
    background: var(--bg-3);
    border: 1px solid var(--line-2);
    color: var(--fg-1);
    font-family: var(--font-mono);
  }
  .icon-btn {
    width: 32px; height: 32px;
    flex-shrink: 0;
    background: var(--bg-2);
    border: 1px solid var(--line-2);
    border-radius: var(--radius-md);
    color: var(--fg-1);
    display: grid; place-items: center;
    cursor: pointer;
    transition: all 120ms;
  }
  .icon-btn:hover { background: var(--bg-3); color: var(--fg-0); border-color: var(--line-3); }

  /* Generate button states */
  .btn-generate {
    display: inline-flex; align-items: center; gap: 8px;
  }
  .btn-generate.busy {
    background: var(--bg-2);
    color: var(--fg-2);
    cursor: not-allowed;
  }
  .btn-generate.busy svg { animation: spin 1.4s linear infinite; }

  /* ---------- AI Multi-select ---------- */
  .ai-field { position: relative; }
  .ai-trigger {
    width: 100%;
    display: flex; align-items: center; gap: 10px;
    background: var(--bg-2);
    border: 1px solid var(--line-2);
    border-radius: var(--radius-md);
    padding: 8px 10px 8px 12px;
    cursor: pointer;
    min-height: 38px;
    transition: border-color 120ms, background 120ms;
  }
  .ai-trigger:hover { border-color: var(--line-3); }
  .ai-trigger.open { border-color: var(--accent-line); box-shadow: 0 0 0 3px var(--accent-soft); }
  .ai-count {
    font-size: 12px;
    font-family: var(--font-mono);
    background: var(--bg-3);
    border: 1px solid var(--line-2);
    border-radius: 999px;
    padding: 2px 8px;
    color: var(--fg-1);
    flex-shrink: 0;
  }
  .ai-summary {
    font-size: 13px;
    color: var(--fg-1);
    flex: 1; min-width: 0;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .ai-fastpill {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 11px;
    padding: 3px 8px;
    border-radius: 999px;
    background: var(--accent-soft);
    border: 1px solid var(--accent-line);
    color: var(--accent-fg);
    font-weight: 500;
    flex-shrink: 0;
  }
  .ai-caret {
    width: 18px; height: 18px;
    display: grid; place-items: center;
    color: var(--fg-2);
    transition: transform 160ms;
  }
  .ai-trigger.open .ai-caret { transform: rotate(180deg); color: var(--fg-0); }

  .ai-panel {
    position: absolute;
    top: calc(100% + 6px); left: 0; right: 0;
    background: var(--bg-1);
    border: 1px solid var(--line-2);
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow-pop);
    z-index: 20;
    overflow: hidden;
    animation: pop 140ms ease-out;
  }
  @keyframes pop {
    from { opacity: 0; transform: translateY(-4px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .ai-panel-header {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 12px;
    border-bottom: 1px solid var(--line-1);
  }
  .ai-search {
    flex: 1;
    background: var(--bg-2);
    border: 1px solid var(--line-2);
    border-radius: var(--radius-md);
    padding: 7px 10px 7px 32px;
    font-family: inherit;
    font-size: 13px;
    color: var(--fg-0);
    position: relative;
  }
  .ai-search-wrap {
    position: relative; flex: 1;
    display: flex; align-items: center;
  }
  .ai-search-wrap svg {
    position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
    color: var(--fg-2);
    pointer-events: none;
  }
  .ai-search:focus {
    outline: none;
    border-color: var(--accent-line);
    box-shadow: 0 0 0 3px var(--accent-soft);
  }
  .ai-toolbar {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 12px;
    border-bottom: 1px solid var(--line-1);
    background: var(--bg-1);
  }
  .filter-pill {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 12px;
    padding: 5px 10px 5px 8px;
    border-radius: 999px;
    border: 1px solid var(--line-2);
    background: var(--bg-2);
    color: var(--fg-1);
    cursor: pointer;
    user-select: none;
    transition: all 120ms;
    font-weight: 500;
  }
  .filter-pill:hover { border-color: var(--line-3); color: var(--fg-0); }
  .filter-pill[aria-pressed="true"] {
    background: var(--accent-soft);
    border-color: var(--accent-line);
    color: var(--accent-fg);
  }
  .filter-pill .dot {
    width: 6px; height: 6px; border-radius: 999px;
    background: var(--fg-3);
    transition: background 120ms;
  }
  .filter-pill[aria-pressed="true"] .dot { background: var(--accent); box-shadow: 0 0 6px var(--accent-line); }
  .toolbar-spacer { flex: 1; }
  .toolbar-link {
    background: none; border: none;
    color: var(--fg-2); font-size: 12px; cursor: pointer;
    padding: 4px 6px;
    font-family: inherit;
  }
  .toolbar-link:hover { color: var(--fg-0); }

  .ai-list {
    max-height: 280px;
    overflow-y: auto;
    padding: 4px 0;
  }
  .ai-list::-webkit-scrollbar { width: 8px; }
  .ai-list::-webkit-scrollbar-track { background: transparent; }
  .ai-list::-webkit-scrollbar-thumb { background: var(--line-2); border-radius: 4px; }
  .ai-list::-webkit-scrollbar-thumb:hover { background: var(--line-3); }

  .ai-row {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 12px;
    cursor: pointer;
    transition: background 100ms;
  }
  .ai-row:hover { background: var(--bg-2); }
  .ai-row.disabled { opacity: 0.4; cursor: not-allowed; }
  .ai-row.disabled:hover { background: transparent; }
  .check {
    width: 16px; height: 16px;
    border-radius: 4px;
    border: 1.5px solid var(--line-3);
    display: grid; place-items: center;
    color: transparent;
    flex-shrink: 0;
    transition: all 120ms;
  }
  .ai-row[data-checked="true"] .check {
    background: var(--accent);
    border-color: var(--accent);
    color: var(--on-accent);
  }
  .ai-meta { flex: 1; min-width: 0; }
  .ai-name {
    font-size: 13px; color: var(--fg-0); font-weight: 500;
    display: flex; align-items: center; gap: 8px;
  }
  .ai-sub {
    font-size: 11px; color: var(--fg-2);
    font-family: var(--font-mono);
    margin-top: 1px;
  }
  .speed-tag {
    font-size: 10px;
    padding: 1px 6px;
    border-radius: 4px;
    border: 1px solid var(--line-2);
    color: var(--fg-2);
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .speed-tag.fast {
